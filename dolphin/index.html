<!doctype html>
<html lang="en">
  <head>
    <title>dolphin</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- <model-viewer> HTML element -->
    <model-viewer src="dolphin_AI.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" scale="0.5 0.5 0.5">
      <button class="Hotspot" slot="hotspot-1" data-position="0.19369351670873702m -0.03726623137880113m -0.03127413084158487m" data-normal="0.9192811776638262m 0.2593169179041537m -0.2961027735123388m" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">dolphin</div>
      </button>
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
      <button slot="ar-button" id="ar-button">
          View in your space
      </button>
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
  </body>
</html>
